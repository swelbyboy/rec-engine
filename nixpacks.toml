[phases.setup]
nixPkgs = ["nodejs_20", "python311"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "/opt/venv/bin/pip install .",
  "cd ui && npm ci"
]

[phases.build]
cmds = ["cd ui && npm run build"]

[start]
cmd = "/opt/venv/bin/uvicorn src.api:app --host 0.0.0.0 --port ${PORT:-8000}"
